<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <style>
      body {
        font-family: "Poppins", sans-serif;
        background: radial-gradient(circle at 50% center, #fff, #9d7559),
          radial-gradient(circle at 75% center, #fff, #9d7559);
        min-height: 100vh;
        justify-content: center;
        align-items: center;
        color: #333;
        margin: 0;
      }
      .contact-container {
        background: #fff;
        max-width: 500px;
        width: 100%;
        border-radius: 16px;
        padding: 30px 40px;
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
        text-align: center;
        margin-inline: auto;
      }
      h1 {
        color: #244a92;
        margin-bottom: 25px;
        font-size: 2.4rem;
        font-weight: 700;
      }
      form {
        display: flex;
        flex-direction: column;
        gap: 18px;
        text-align: left;
      }
      label {
        font-weight: 600;
        margin-bottom: 6px;
        color: #244a92;
      }
      input,
      textarea {
        padding: 12px 15px;
        font-size: 1rem;
        border-radius: 10px;
        border: 1.8px solid #6b8ce3;
        transition: border-color 0.3s ease;
        resize: vertical;
        font-family: inherit;
      }
      input:focus,
      textarea:focus {
        outline: none;
        border-color: #244a92;
        box-shadow: 0 0 6px rgba(36, 74, 146, 0.5);
      }
      textarea {
        min-height: 100px;
      }
      button {
        padding: 14px;
        background-color: #244a92;
        color: white;
        font-size: 1.2rem;
        font-weight: 700;
        border-radius: 12px;
        border: none;
        cursor: pointer;
        transition: background-color 0.3s ease;
      }
      button:hover {
        background-color: #1a3564;
      }
      .contact-info {
        margin-top: 30px;
        text-align: center;
        font-size: 1.1rem;
        color: #444;
      }
      .contact-info strong {
        color: #244a92;
      }
      @media (max-width: 600px) {
        .contact-container {
          padding: 25px 20px;
        }
        h1 {
          font-size: 2rem;
        }
      }
    </style>
  </head>
  <body>
    <div >
      <div class="container">
        <div class="navbar">
          <div class="logo">
            <a href="index.html"
              ><img src="images/logo.png" alt="logo" width="125px"
            /></a>
          </div>
          <nav>
            <ul id="MenuItems">
              <li><a href="index.html">Home</a></li>
              <li><a href="about.html">About</a></li>
              <li><a href="contact.html">Contact</a></li>
            </ul>
          </nav>
        </div>
      </div>
    </div>
    <div class="contact-container">
      <h1>Contact Us</h1>
      <form>
        <label for="name">Name</label>
        <input
          type="text"
          id="name"
          name="name"
          placeholder="Your name"
          required
        />

        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="your.email@example.com"
          required
        />

        <label for="message">Message</label>
        <textarea
          id="message"
          name="message"
          placeholder="Write your message here..."
          required
        ></textarea>

        <button type="submit">Send Message</button>
      </form>
    </div>
  </body>
</html>
